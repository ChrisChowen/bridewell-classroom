name: CI

# Gate for autonomous + human work: type-check, unit tests, and a
# production build must all pass before anything lands on main. This is
# the safety net that lets long unattended work proceed without rotting
# the tree. Keep it fast (< ~3 min) so it never becomes a reason to skip.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    # Match the deployed Cloud Function runtime (firebase-frameworks GEN_2
    # is nodejs20). Pinning avoids a Node-version drift between CI and prod.
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install (clean, lockfile-exact)
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint (zero warnings)
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Perf gate (informational in CI)
        # Isolated, ratio-normalised microbenchmark of the pure hot paths
        # (vitest.perf.config.ts; baseline scripts/perf-baseline.json). It is a
        # HARD ≥30% regression gate LOCALLY (`npm run bench` on a consistent
        # machine), but informational in CI: the committed baseline is captured
        # on one architecture and op-vs-calibration ratios differ across CPUs
        # (Apple Silicon vs the x86 runner), so a hard cross-runner gate would
        # flake (B3). A true CI gate needs a same-runner cached baseline —
        # tracked in reports/follow-ups.md. Regressions still surface in logs.
        run: npm run bench
        continue-on-error: true

      - name: Production build
        # The build statically renders the public routes. Real secrets are
        # never needed here (API routes don't execute at build time); we
        # provide harmless placeholders so client-config reads during
        # static generation are deterministic. NEVER put real keys here —
        # these are public-config placeholders only.
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: "ci-placeholder"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "bridewell-classroom.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "bridewell-classroom"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "bridewell-classroom.appspot.com"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:ciplaceholder"
          NEXT_PUBLIC_FIREBASE_DATABASE_URL: "https://bridewell-classroom-default-rtdb.europe-west1.firebasedatabase.app"
        run: npm run build

  # Accessibility gate — axe-core over the auth-free public pages (landing /
  # login / join) in light + dark. Separate job so the Playwright browser +
  # build don't slow the unit gate. The emulator-backed demo-flow specs run
  # in the `e2e` job below.
  a11y:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: "ci-placeholder"
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "bridewell-classroom.firebaseapp.com"
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: "bridewell-classroom"
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "bridewell-classroom.appspot.com"
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:ciplaceholder"
      NEXT_PUBLIC_FIREBASE_DATABASE_URL: "https://bridewell-classroom-default-rtdb.europe-west1.firebasedatabase.app"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Build
        run: npm run build
      - name: Start server + run axe a11y sweep
        run: |
          npm run start &
          for i in $(seq 1 60); do
            curl -sf http://localhost:3000 >/dev/null && break
            sleep 1
          done
          BASE_URL=http://localhost:3000 npm run test:a11y

  # Emulator-backed demo-flow e2e — pupil-join + B1 Reason-resumption
  # (productive-struggle). Runs the app in emulator mode (no live backend,
  # LLM in deterministic fallback) under the Firebase emulator suite.
  e2e:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: "ci-placeholder"
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "bridewell-classroom.firebaseapp.com"
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: "bridewell-classroom"
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "bridewell-classroom.appspot.com"
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:ciplaceholder"
      NEXT_PUBLIC_FIREBASE_DATABASE_URL: "https://bridewell-classroom-default-rtdb.europe-west1.firebasedatabase.app"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      # The Firestore + Database emulators are Java; firebase-tools requires
      # JDK 21+.
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Install Firebase CLI (for the emulator suite)
        run: npm install -g firebase-tools
      - name: Enable webframeworks experiment
        # firebase.json carries a Next.js hosting config; emulators:exec
        # detects it (even with --only auth,firestore,database) and errors
        # unless this experiment is enabled. It's already on locally.
        run: firebase experiments:enable webframeworks
      - name: Emulator-backed e2e (pupil-join + B1 resume)
        run: npm run test:e2e
